<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/BeeReady_Logo_negyzet_atlatszo.PNG">
    <link rel="stylesheet" href="../css/container.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/profil.css">
    <title>BeeReady</title>
</head>

<body>
    <div class="main_grid">

        <!--navbar-->
        <nav class="navbar">
            <div class="logo">
                <img src="../img/BeeReady_Logo_negyzet_atlatszo.PNG" alt="">
                <h1>BeeReady</h1>
            </div>
            <hr>
            <div class="nav_items_div">
                <div onclick="navbar_click('fooldal', 1)" value="fooldal" class="nav_items active">Főoldal</div>
                <div onclick="navbar_click('tanulokartyak',2)" value="tanulokartyak" class="nav_items">Tanulókártyák
                </div>
                <!-- <div onclick="navbar_click('classrooms')" class="nav_items">termek</div> -->
                <div onclick="navbar_click('chat',3)" value="chat" class="nav_items">Chat</div>
                <div onclick="navbar_click('felhasznalo',4), felhasznalo_betoltes()" value="felhasznalo"
                    class="nav_items nav_profil">
                    <div class="profil_img">
                        <img src="../img/allatos_profilkepek/farkas.webp" alt="">
                    </div>
                    <span class="profil_nev">Felhasználó</span>
                </div>
            </div>
        </nav>
        <div class="fodiv">
            <!--foooldal-->
            <div class="workspace mainelem" id="fooldal">
                <section id="tasks">Feladatok</section>
                <aside id="chat">chat</aside>
                <div id="calendar">naptar</div>
                <div id="to-do">to-do </div>
            </div>

            <!--profil kezeles-->
            <div class="account dnone mainelem" id="felhasznalo">
                <div class="account_div">
                    <div class="profil_img_div">
                        <div class="profil_img" id="prof_img">
                            <img src="../img/allatos_profilkepek/farkas.webp" alt="">
                        </div>
                        <div class="account_buttons">
                            <button class="account_button">Mentés</button>
                        </div>
                    </div>
                    <div class="modal dnone" id="profil_modal">
                        <div class="modal_content">
                            <div class="avatar_options">
                                <img src="../img/allatos_profilkepek/farkas.webp" alt="" class="avatar_option">
                                <img src="../img/allatos_profilkepek/sarkany.webp" alt="" class="avatar_option">
                                <img src="../img/allatos_profilkepek/solyom.webp" alt="" class="avatar_option">
                            </div>
                            <button class="account_button" id="close">Bezár</button>
                        </div>
                    </div>
                    <div class="account_inputs input-group">
                        <div class="account_border_div">
                            <label for="felh">Felhasználónév</label>
                            <input type="text" id="szerkusername" name="felh" placeholder="Felhasználónév">
                        </div>
                        <div class="account_border_div">
                            <label for="email">E-mail</label>
                            <input type="email" id="szerkemail" name="email" placeholder="E-mail">
                        </div>
                        <div class="account_border_div">

                            <label for="jelenlegijelszo">Jelenlegi jelszó</label>
                            <input type="password" id="szerkjelenlegijelszo" name="jelenlegijelszo"
                                placeholder="Jelenlegi jelszó">
                        </div>
                        <div class="account_border_div">
                            <label for="ujjelszo">Új jelszó</label>
                            <input type="password" id="szerkujjelszo" name="ujjelszo" placeholder="Új jelszó">
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </div>
    <script src="../../backend/javascript/navbar.js"></script>
    <script src="../../backend/javascript/profil_szerk.js"></script>
</body>

</html>
