<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/BeeReady_Logo_negyzet_atlatszo.PNG">
    <link rel="stylesheet" href="../css/container.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/profil.css">
    <link rel="stylesheet" href="../css/chat.css">
    <link rel="stylesheet" href="../css/mobilview.css">
    <link rel="stylesheet" href="../css/flashcards.css">
    <title>BeeReady</title>
</head>

<body>
    <div class="main_grid">

        <!--navbar-->
        <nav class="navbar" id="navbar">
            <div class="logo">
                <img src="../img/BeeReady_Logo_negyzet_atlatszo.PNG" alt="img">
                <h1>BeeReady</h1>
            </div>
            <hr>

            <div class="hamburger" onclick="toggleMenu()">
                <div class="hamburder_padding">
                    <div class="hamburger_border">
                        <img src="../img/hamburger.png" alt="img">
                    </div>
                </div>
            </div>
            <div class="nav_items_div">
                <div onclick="navbar_click('fooldal',1)" class="nav_items active">Főoldal</div>
                <div onclick="navbar_click('tanulokartyak',2)" class="nav_items">Tanulókártyák</div>
                <div onclick="navbar_click('chat',3)" class="nav_items">Chat</div>

                <div onclick="navbar_click('felhasznalo',4), felhasznalo_betoltes()" class="nav_items nav_profil">
                    <div class="profil_img">
                        <img id="navbar_profil_pic_url" src="../img/allatos_profilkepek/ures.webp" alt="">
                    </div>
                    <span id="felhasznalonev" class="profil_nev">Felhasználó</span>
                </div>
            </div>
        </nav>
        <div class="fodiv">
            <!--foooldal-->
            <div class="workspace mainelem" id="fooldal">
                <section id="tasks">Feladatok</section>
                <div id="calendar">naptar</div>
                <div id="to-do">to-do </div>
            </div>

            <!--Chat-->
            <div class="chatclass dnone mainelem" id="chat">
                <div class="chat_div">
                    <div class="chat_header">
                        <h1><span>Chatnev</span></h1>
                    </div>
                    <div class="chat_messages">
                        <div class="chat_bubble">
                            <img src="../img/allatos_profilkepek/farkas.webp" class="chat_profile_pic">
                            <div class="chat_text">
                                <label>Felhasználó</label>
                                <p>Chat teszt</p>
                            </div>
                        </div>
                        <div class="chat_bubble mine">
                            <div class="chat_text">
                                <p>Chat teszt</p>
                            </div>
                            <img src="../img/allatos_profilkepek/farkas.webp" class="chat_profile_pic">
                        </div>
                    </div>
                    <div class="chat_input">
                        <textarea placeholder="Aa"></textarea>
                        <button><img src="../img/plane.png" alt="Send"></button>
                    </div>
                </div>
            </div>

            <!--tanulokartyak-->
            <div class="cards dnone mainelem" id="tanulokartyak">
                <div class="deck_creator">
                    <input type="text" class="newflashcard_input" id="newDeckName"
                        placeholder="Új pakli neve (pl.: Történelem - 10. osztály)" required>
                    <button id="createDeckButton">Pakli létrehozása</button>
                </div>
                <hr>
                <div class="deck_list" id="deckList">
                    <h3>Jelenlegi paklijaid:</h3>
                </div>
            </div>
            <!--profil kezeles-->
            <div class="account dnone mainelem" id="felhasznalo">
                <form id="szerkesztes">
                    <div class="account_div">
                        <div class="profil_img_div">
                            <div class="profil_img" id="prof_img">
                                <img id="szerkprofilpic" src="../img/allatos_profilkepek/ures.webp" alt="">
                            </div>
                            <div class="account_buttons">
                                <button type="submit" class="account_button">Mentés</button>
                                <a onclick="logout()">Kijelentkezés</a>
                            </div>
                        </div>
                        <div class="modal dnone" id="profil_modal">
                            <div class="modal_content">
                                <div class="avatar_options">
                                    <img src="../img/allatos_profilkepek/farkas.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/roka.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/medve.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/oroszlan.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/tigris.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/bagoly.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/solyom.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/hollo.webp" alt="" class="avatar_option">
                                    <img src="../img/allatos_profilkepek/sas.webp" alt="" class="avatar_option">
                                </div>
                                <button class="account_button" id="close">Bezár</button>
                            </div>
                        </div>
                        <div class="account_kenyszerdiv">
                            <div class="account_inputs input-group">
                                <div class="account_border_div">
                                    <label for="felh">Felhasználónév</label>
                                    <input type="text" id="szerkusername" name="felh" placeholder="Felhasználónév"
                                        required>
                                </div>
                                <div class="account_border_div">
                                    <label for="email">E-mail</label>
                                    <input type="email" id="szerkemail" name="email" placeholder="E-mail" required>
                                </div>
                                <div class="account_border_div">

                                    <label for="jelenlegijelszo">Jelenlegi jelszó</label>
                                    <input type="password" id="currentpassword" name="jelenlegijelszo"
                                        placeholder="Jelenlegi jelszó" required>
                                </div>
                                <div class="account_border_div">
                                    <label for="ujjelszo">Új jelszó</label>
                                    <input type="password" id="newpassword" name="ujjelszo" placeholder="Új jelszó">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>


    </div>
    <script src="../javascript/navbar.js"></script>
    <script src="../javascript/profil_szerk.js"></script>
</body>

</html>
