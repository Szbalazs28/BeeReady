<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/BeeReady_Logo_negyzet_atlatszo.PNG">
    <link rel="stylesheet" href="../css/container.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/profil.css">
    <title>BeeReady</title>
</head>

<body>
    <div class="main_grid">

        <!--navbar-->
        <nav class="navbar">
            <div class="logo">
                <img src="../img/BeeReady_Logo_negyzet_atlatszo.PNG" alt="">
                <h1>BeeReady</h1>
            </div>
            <div class="nav_items_div">
                <div onclick="navbar_click('fooldal', 1)" value="fooldal" class="nav_items active">Főoldal</div>
                <div onclick="navbar_click('tanulokartyak',2)" value="tanulokartyak" class="nav_items">Tanulókártyák
                </div>
                <!-- <div onclick="navbar_click('classrooms')" class="nav_items">termek</div> -->
                <div onclick="navbar_click('chat',3)" value="chat" class="nav_items">Chat</div>
                <div onclick="navbar_click('felhasznalo',4)" value="felhasznalo" class="nav_items nav_profil">
                    <div class="profil_img">
                        <img src="img/profil.png" alt="">
                    </div>
                    <span class="profil_nev">Felhasználó</span>
                </div>
            </div>
        </nav>
        <div class="fodiv">
            <!--foooldal-->
            <div class="workspace mainelem" id="fooldal">
                <section id="tasks">Feladatok</section>
                <aside id="chat">chat</aside>
                <div id="calendar">naptar</div>
                <div id="to-do">to-do </div>
            </div>

            <!--profil kezeles-->
            <div class="account dnone mainelem" id="felhasznalo">
                <div class="account_div">
                    <div class="profil_img_div">
                        <div class="profil_img">
                            <img src="img/profil.png" alt="">
                        </div>
                    </div>
                    <div class="account_inputs input-group">
                        <input type="text" name="felh" placeholder="felhasználó">
                        <input type="email" name="email" placeholder="email">
                        <input type="password" name="ujjelsz" placeholder="jelszovaltoztatas">
                    </div>
                </div>
            </div>
        </div>


    </div>
    <script src="../../backend/javascript/navbar.js"></script>
</body>

</html>
