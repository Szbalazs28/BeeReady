<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeReady – Admin</title>
    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/chat.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            padding: 1.5rem;
        }

        .table input.form-control {
            min-width: 120px;
        }

        .badge-admin {
            font-size: 0.75rem;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-4 mb-4">
        <span class="navbar-brand">BeeReady Admin</span>
        <div class="btn-group">
            <button class="btn btn-outline-light  btn-sm " onclick="toggleHashContainer()">Hash generátor</button>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Kijelentkezés</button>
        </div>

    </nav>
    <div class="container d-none py-5" id="hash-container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">

                        <h4 class="text-center mb-4">Hash generálás</h4>

                        <div class="mb-3">
                            <label for="hash-password" class="form-label">
                                Jelszó megadása
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">🔒️</span>
                                <input type="password" id="hash-password" class="form-control"
                                    placeholder="Írd be a jelszót">
                            </div>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-dark btn-lg rounded-3" onclick="generateHash()">
                                Hash generálása
                            </button>
                        </div>

                        <div class="mt-4">
                            <label class="form-label">Eredmény</label>
                            <div id="hash-result" class="form-control bg-light text-break" style="min-height: 50px;">
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h5 class="mb-0 fw-semibold">Felhasználók</h5>
            <span class="text-muted small" id="user-count"></span>
        </div>

        <div class="table-container">
            <div class="mb-3">
                <input type="text" id="search-input" class="form-control"
                    placeholder="Keresés felhasználónév alapján...">
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="users-table">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Felhasználónév</th>
                            <th>E-mail</th>
                            <th>Jelszó</th>
                            <th>Profilkép URL</th>
                            <th class="text-center">Módosítás</th>
                            <th class="text-center">Törlés</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="7" class="text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>Betöltés...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../javascript/main.js"></script>
    <script src="../javascript/admin.js"></script>
</body>

</html>
