<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeeReady – Admin</title>
    <link href="../bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/chat.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .table-container { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 1.5rem; }
        .table input.form-control { min-width: 120px; }
        .badge-admin { font-size: 0.75rem; }
        #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand">BeeReady Admin</span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Kijelentkezés</button>
</nav>

<div class="container-fluid px-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="mb-0 fw-semibold">Felhasználók</h5>
        <span class="text-muted small" id="user-count"></span>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="users-table">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Felhasználónév</th>
                        <th>E-mail</th>
                        <th>Jelszó</th>
                        <th>Profilkép URL</th>
                        <th class="text-center">Módosítás</th>
                        <th class="text-center">Törlés</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr>
                        <td colspan="7" class="text-center py-4 text-muted">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>Betöltés...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title text-danger">Törlés megerősítése</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Biztosan törlöd a <strong id="delete-username"></strong> felhasználót? Ez a művelet nem visszavonható.
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Mégse</button>
                <button type="button" class="btn btn-danger" id="confirm-delete-btn">Törlés</button>
            </div>
        </div>
    </div>
</div>

<script src="../bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="../javascript/main.js"></script>   
<script src="../javascript/admin.js"></script>  
</body>
</html>
