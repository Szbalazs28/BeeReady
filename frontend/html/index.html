<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../img/BeeReady_Logo_negyzet_atlatszo.PNG">
  <link rel="stylesheet" href="../css/style.css">
  <title>BeeReady</title>
</head>

<body>
  <div class="main">
    <div class="card">
      <h1>BeeReady</h1>
      <hr>
      <p id="uzenet"></p>
      <!--regisztráció felület (alaphelyzetben megjelenik)-->
      <div id="regdiv"style="display: none;">

        <h2>Regisztráció</h2>
        <p class="switch">Van már fiókod? >> <a href="#" onclick="login_signin()">Bejelentkezés</a>
        </p>
        <form id="regform">
          <div class="input-group">
            <input type="text" id="regusername" placeholder="Felhasználónév" required>
          </div>
          <div class="input-group">
            <input type="email" id="regemail" placeholder="E-mail" required>
          </div>
          <div class="input-group">
            <input type="password" id="regpassword" placeholder="Jelszó" required>
          </div>

          <button type="submit" class="signin-btn">Fiók létrehozása</button>
        </form>

      </div>

      <!--bejelentkezés felület (alaphelyzetben nem jelenik meg)-->
      <div id="logdiv" >
        <h2>Bejelentkezés</h2>
        <p class="switch">Vissza >> <a href="#" onclick="login_signin()">Regisztráció</a>
        </p>
        <form id="loginform">
          <div class="input-group">
            <input type="text" id="logemail" placeholder="E-mail" required>
          </div>
          <div class="input-group">
            <input type="password" id="logpassword" placeholder="Jelszó" required>
          </div>
          <div class="options">
            <div class="wrap">
              <input type="checkbox" id="stay">
              <label for="stay">Maradj bejelentkezve</label>
            </div>
            <a href="#" onclick="forget_Password()">Elfelejtettem a jelszavam</a>
          </div>
          <button type="submit" class="login-btn">Bejelentkezés</button>
        </form>

      </div>

      <!--elfelejtett jelszó felület (alaphelyzetben nem jelenik meg)-->
      <div id="forget_password_div" style="display: none;">
        <h2>Elfelejtettem a jelszavam</h2>
        <p class="switch">Vissza >> <a href="#" onclick="login_signin()">Regisztráció</a></p>
        <form>
          <div class="input-group">
            <input type="email" id="email" placeholder="E-mail cím" required>
          </div>
          <button type="submit" class="forget_password_button">Jelszó küldése</button>
        </form>

      </div>
    </div>
  </div>
  <script src="../../backend/javascript/index.js"></script>
</body>

</html>
