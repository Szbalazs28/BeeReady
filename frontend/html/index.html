<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../img/BeeReady_Logo_negyzet_atlatszo.PNG">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profil.css">
  <title>BeeReady</title>
</head>

<body>
  <div class="main">
    <div class="card">
      <h1>BeeReady</h1>
      <hr>
      <p id="uzenet"></p>
      <!--regisztráció felület (alaphelyzetben nem jelenik meg)-->
      <div id="regdiv" style="display: none;">
        <h2>Regisztráció</h2>
        <p class="switch">Van már fiókod? <a href="#" onclick="login_register()">Bejelentkezés</a>
        </p>

        <form id="regform">
          <div>
            <div class="input-group">
              <input type="text" id="regusername" placeholder="Felhasználónév" required>
            </div>
            <div class="input-group">
              <input type="email" id="regemail" placeholder="E-mail" required>
            </div>
            <div class="input-group">
              <input type="password" id="regpassword" placeholder="Jelszó" required>
            </div>
            <button type="submit" class="signin-btn">Fiók létrehozása</button>
          </div>
          <div class="profil_img_div">
            <div class="profil_img" id="prof_img">
              <img id="profil_pic_url" src="../img/allatos_profilkepek/ures.webp" alt="">
            </div>
          </div>
          <div class="modal" id="profil_modal">
            <div class="modal_content" >
              <div class="avatar_options">
                <img src="../img/allatos_profilkepek/farkas.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/roka.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/medve.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/oroszlan.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/tigris.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/bagoly.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/solyom.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/hollo.webp" alt="" class="avatar_option">
                <img src="../img/allatos_profilkepek/sas.webp" alt="" class="avatar_option">
              </div>
              <button class="account_button" id="close">Bezár</button>
            </div>
          </div>
        </form>
      </div>

      <!--bejelentkezés felület (alaphelyzetben megjelenik)-->
      <div id="logdiv">
        <h2>Bejelentkezés</h2>
        <p class="switch"><a href="#" onclick="login_register()">Regisztráció</a>
        </p>
        <form id="loginform">
          <div class="input-group">
            <input type="text" id="logemail" placeholder="E-mail" required>
          </div>
          <div class="input-group">
            <input type="password" id="logpassword" placeholder="Jelszó" required>
          </div>
          <div class="options">
            <div class="wrap">
              <input type="checkbox" id="stay">
              <label for="stay">Maradj bejelentkezve</label>
            </div>
            <a href="#" onclick="forget_Password()">Elfelejtettem a jelszavam</a>
          </div>
          <button type="submit" class="login-btn">Bejelentkezés</button>
        </form>

      </div>

      <!--elfelejtett jelszó felület (alaphelyzetben nem jelenik meg)-->
      <div id="forget_password_div" style="display: none;">
        <h2>Elfelejtettem a jelszavam</h2>
        <p class="switch">Vissza<a href="#" onclick="login_register()">Regisztráció</a></p>
        <form>
          <div class="input-group">
            <input type="email" id="email" placeholder="E-mail cím" required>
          </div>
          <button type="submit" class="forget_password_button">Jelszó küldése</button>
        </form>

      </div>
    </div>
  </div>
  <script src="../../backend/javascript/index.js"></script>
</body>

</html>
