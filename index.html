<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="img/BeeReady_Logo_negyzet_atlatszo.PNG">
  <title>BeeReady</title>
  <link rel="stylesheet" href="style.css">
  
  
</head>

<body>
  <div class="login-card">
    <h1>BeeReady</h1>
    <hr>
    <form id="regform">
      <div class="input-group">
        <input type="email" id="email" placeholder="" required>
        <label for="email">E-mail</label>
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Jelszó</label>
      </div>
      <button type="submit" class="login-btn" onclick="">Regisztráció</button>      
    </form>
    <form id="loginform">
      <div class="input-group">
        <input type="email" id="loginemail" placeholder="" required>
        <label for="loginemail">E-mail</label>
      </div>
      <div class="input-group">
        <input type="password" id="loginpassword" placeholder=" " required>
        <label for="loginpassword">Jelszó</label>
      </div>
      <button type="submit" class="login-btn" onclick="">Bejelentkezés</button>
      <p id="uzenet"></p>
    </form>
    
  
  <script>
    let uzenet = document.getElementById("uzenet")
    document.getElementById("regform").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const response = await fetch("http://localhost:4000/regisztracio", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      message = await response.json()
      uzenet.innerHTML = message.message
      
    });
    document.getElementById("loginform").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("loginemail").value;
      const password = document.getElementById("loginpassword").value;

      const response = await fetch("http://localhost:4000/bejelentkezes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      message = await response.json()
      uzenet.innerHTML = message.message
      
    });
    

  </script>
  <script src="sql.js"></script>
</body>

</html>
